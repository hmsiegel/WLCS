version: '3.4'

services:
  wlcs.api:
    image: ${DOCKER_REGISTRY-}wlcsapi
    container_name: WLCS.Api
    build:
      context: .
      dockerfile: src/api/WLCS.Api/Dockerfile
    ports:
      - 5000:8080
      - 5001:8081
  
  wlcs.database:
    image: postgres:latest
    container_name: WLCS.Database
    environment:
      POSTGRES_USER: wlcs
      POSTGRES_PASSWORD: wlcs
      POSTGRES_DB: wlcs
    volumes:
      - ./.containers/db:/var/lib/postgresql/data
    ports:
      - 5432:5432

  wlcs.identity:
    image: quay.io/keycloak/keycloak:latest
    container_name: WLCS.Identity
    command: start-dev --import-realm
    environment:
      - KC_HEALTH_ENABLED=true
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
    volumes:
      - ./.containers/identity:/opt/keycloak/data
      - ./.files:/opt/keycloak/data/import
    ports:
      - 18080:8080
 

  wlcs.seq:
    image: datalust/seq:latest
    container_name: WLCS.Seq
    environment:
      - ACCEPT_EULA=Y
    ports:
      - 5341:5341
      - 8081:80
  
  wlcs.redis:
    image: redis:latest
    container_name: WLCS.Redis
    restart: always
    ports:
      - 6379:6379
